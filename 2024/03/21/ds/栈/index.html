.pop();<br>            res = numberStack.cal(num1,num2,oper);<br>            numberStack.push(res);<br>        &#125;<br>        System.out.printf(<span class="hljs-string">&quot;表达式%s = %d&quot;</span>,expression,numberStack.pop());<br>    &#125;<br>&#125;<br><br><span class="hljs-keyword">class</span> <span class="hljs-title class_">ArrayStack2</span> &#123;<br>    <span class="hljs-keyword">private</span> <span class="hljs-type">int</span> maxSize;<br>    <span class="hljs-keyword">private</span> <span class="hljs-type">int</span>[] stack;<br>    <span class="hljs-keyword">private</span> <span class="hljs-type">int</span> <span class="hljs-variable">top</span> <span class="hljs-operator">=</span> -<span class="hljs-number">1</span>;<br><br><span class="hljs-comment">//    构造方法</span><br>    <span class="hljs-keyword">public</span> <span class="hljs-title function_">ArrayStack2</span><span class="hljs-params">(<span class="hljs-type">int</span> maxSize)</span> &#123;<br>        <span class="hljs-built_in">this</span>.maxSize = maxSize;<br>        stack = <span class="hljs-keyword">new</span> <span class="hljs-title class_">int</span>[<span class="hljs-built_in">this</span>.maxSize];<br>    &#125;<br><br>    <span class="hljs-comment">//    栈满</span><br>    <span class="hljs-keyword">public</span> <span class="hljs-type">boolean</span> <span class="hljs-title function_">isFull</span><span class="hljs-params">()</span> &#123;<br>        <span class="hljs-keyword">return</span> top == maxSize - <span class="hljs-number">1</span>;<br>    &#125;<br>    <span class="hljs-comment">//    栈空</span><br>    <span class="hljs-keyword">public</span> <span class="hljs-type">boolean</span> <span class="hljs-title function_">ifEmpty</span><span class="hljs-params">()</span> &#123;<br>        <span class="hljs-keyword">return</span> top == -<span class="hljs-number">1</span>;<br>    &#125;<br>    <span class="hljs-comment">//    入栈</span><br>    <span class="hljs-keyword">public</ ndNotationDemo</span> &#123;<br>    <span class="hljs-comment">//中缀转后缀</span><br>    <span class="hljs-keyword">public</span> <span class="hljs-keyword">static</span> <span class="hljs-keyword">void</span> <span class="hljs-title function_">main</span><span class="hljs-params">(String[] args)</span> &#123;<br>        <span class="hljs-type">String</span> <span class="hljs-variable">expression</span> <span class="hljs-operator">=</span> <span class="hljs-string">&quot;1+((2+3)*4)-5&quot;</span>;<br><span class="hljs-comment">//      -&gt;123+4*+5-</span><br>        List&lt;String&gt; infix = toInfixExpressionList(expression);<br>        System.out.println(infix);<br>        List&lt;String&gt; parse = parseSuffixExpressionList(infix);<br>        System.out.println(parse);<br>    &#125;<br>    <span class="hljs-keyword">public</span> <span class="hljs-keyword">static</span> List&lt;String&gt; <span class="hljs-title function_">toInfixExpressionList</span><span class="hljs-params">(String s)</span> &#123;<br>        List&lt;String&gt; ls = <span class="hljs-keyword">new</span> <span class="hljs-title class_">ArrayList</span>&lt;&gt;();<br>        <span class="hljs-type">int</span> <span class="hljs-variable">i</span> <span class="hljs-operator">=</span> <span class="hljs-number">0</span>;<br>        String str;<br>        <span class="hljs-type">char</span> c;<br>        <span class="hljs-keyword">do</span> &#123;<br>            <span class="hljs-keyword">if</span>((c=s.charAt(i)) &lt; <span class="hljs-number">48</span> || (c=s.charAt(i)) &gt; <span class="hljs-number">57</span>) &#123;<br>                ls.add(<span class="hljs-string">&quot;&quot;</span>+c);<br>                i++;<br>            &#125;<br>            <span class="hljs-keyword">else</span> &#123;<br>                str = <span class="hljs-string">&quot;&quot;</span>;<br>                <span class="hljs-keyword">while</span> (i &lt; s.length() &amp;&amp; (c=s.charAt(i)) &gt;= <span class="hljs-number">48</span> &amp;&amp; (c=s.charAt(i)) &lt;= <span class="hljs-number">57</span>) &#123;<br>                    str += c;<br>                    i++;<br>                &#125;<br>                ls.add(str);<br>            &#125;<br>        &#125;<span class="hljs-keyword">while</span> (i &lt; s.length());<br>        <span class="hljs-keyword">return</span> ls;<br>    &#125;<br><span class="hljs-comment">//1+((2+3)*4)-5  ==&gt;  123+4*+5-</span><br>    <span class="hljs-comment">/*</span><br><span class="hljs-comment">    1. 如果是数字，直接入s2</span><br><span class="hljs-comment">    2. 如果是符号：</span><br><span class="hljs-comment">        1. 如果s1为空：直接入s1</span><br><span class="hljs-comment">        2. 若s1不为空：</span><br><span class="hljs-comment">            1.</span><br><span class="hljs-comment">     */</span><br>    <span class="hljs-keyword">public</span> <span class="hljs-keyword">static</span> List&lt;String&gt; <span class="hljs-title function_">parseSuffixExpressionList</span><span class="hljs-params">(List&lt;String&gt; ls)</span>&#123;<br>        <span class="hljs-comment">//定义两个栈</span><br>        Stack&lt;String&gt; s1 = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Stack</span>&lt;&gt;();<br>        <span class="hljs-comment">//由于s2这个栈在整个转换的过程中没有pop操作，而且如果采用栈结构，后续还需要逆序输出（比较麻烦），因此直接用List</span><br>        List&lt;String&gt; s2 = <span class="hljs-keyword">new</span> <span class="hljs-title class_">ArrayList</span>&lt;&gt;();<br><br>        <span class="hljs-comment">//遍历ls</span><br>        <span class="hljs-keyword">for</span>(String item: ls) &#123;<br>            <span class="hljs-keyword">if</span>(item.matches(<span class="hljs-string">&quot;\\d+&quot;</span>)) &#123;<br>                s2.add(item);<br>            &#125; <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span>(item.equals(<span class="hljs-string">&quot;(&quot;</span>)) &#123;<br>                s1.push(item);<br>            &#125; <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span>(item.equals(<span class="hljs-string">&quot;)&quot;</span>)) &#123;<br>                <span class="hljs-keyword">while</span> (!s1.peek().equals(<span class="hljs-string">&quot;(&quot;</span>)) &#123;<br>                    s2.add(s1.pop());<br>                &#125;<br>                s1.pop(); <span class="hljs-comment">//消除小括号</span><br>            &#125; <span class="hljs-keyword">else</span> &#123;<br>                <span class="hljs-keyword">while</span> (s1.size() != <span class="hljs-number">0</span> &amp;&amp; Operation.getValue(s1.peek()) &gt;= Operation.getValue(item)) &#123;<br>                    s2.add(s1.pop());<br>                &#125;<br>                s1.push(item);<br>            &#125;<br>        &#125;<br>        <span class="hljs-keyword">while</span> (s1.size() != <span class="hljs-number">0</span>) &#123;<br>            s2.add(s1.pop());<br>        &#125;<br>        <span class="hljs-keyword">return</span> s2;<br>    &#125;<br><br><br>&#125;<br><br><span class="hljs-comment">//编写一个类，返回运算符对应的优先级</span><br><span class="hljs-keyword">class</span> <span class="hljs-title class_">Operation</span> &#123;<br>    <span class="hljs-keyword">private</span> <span class="hljs-keyword">static</span> <span class="hljs-type">int</span> <span class="hljs-variable">ADD</span> <span class="hljs-operator">=</span> <span class="hljs-number">1</span>;<br>    <span class="hljs-keyword">private</span> <span class="hljs-keyword">static</span> <span class="hljs-type">int</span> <span class="hljs-variable">SUB</span> <span class="hljs-operator">=</span> <span class="hljs-number">1</span>;<br>    <span class="hljs-keyword">private</span> <span class="hljs-keyword">static</span> <span class="hljs-type">int</span> <span class="hljs-variable">MUL</span> <span class="hljs-operator">=</span> <span class="hljs-number">2</span>;<br>    <span class="hljs-keyword">private</span> <span class="hljs-keyword">static</
