ic</span> Emp next; <span class="hljs-comment">//next默认为null</span><br><br>    <span class="hljs-keyword">public</span> <span class="hljs-title function_">Emp</span><span class="hljs-params">(<span class="hljs-type">int</span> id, String name)</span> &#123;<br>        <span class="hljs-built_in">super</span>();<br>        <span class="hljs-built_in">this</span>.id = id;<br>        <span class="hljs-built_in">this</span>.name = name;<br>    &#125;<br>&#125;<br><br><span class="hljs-comment">//表示链表</span><br><span class="hljs-keyword">class</span> <span class="hljs-title class_">EmpLinkedList</span>&#123;<br>    <span class="hljs-comment">//没有头结点，直接指向第一个Emp</span><br>    <span class="hljs-keyword">private</span> Emp head;<br><br>    <span class="hljs-comment">//添加雇员</span><br>    <span class="hljs-comment">/*</span><br><span class="hljs-comment">    说明：</span><br><span class="hljs-comment">    假定当添加雇员时，id是自增长，我们可以直接将该雇员加入到本链表的最后</span><br><span class="hljs-comment">     */</span><br>    <span class="hljs-keyword">public</span> <span class="hljs-keyword">void</span> <span class="hljs-title function_">add</span><span class="hljs-params">(Emp emp)</span>&#123;<br>        <span class="hljs-comment">//如果是第一个雇员</span><br>        <span class="hljs-keyword">if</span> (head == <span class="hljs-literal">null</span>)&#123;<br>            head = emp;<br>            <span class="hljs-keyword">return</span>;<br>        &#125;<br>        <span class="hljs-comment">//如果不是第一个雇员，需要通过辅助指针遍历找到最后一个结点</span><br>        <span class="hljs-type">Emp</span> <span class="hljs-variable">curEmp</span> <span class="hljs-operator">=</span> head;<br>        <span class="hljs-keyword">while</span> (<span class="hljs-literal">true</span>)&#123;<br>            <span class="hljs-keyword">if</span> (curEmp.next == <span class="hljs-literal">null</span>)&#123;<br>                <span class="hljs-keyword">break</span>;<br>            &#125; <span class="hljs-keyword">else</span> &#123;<br> /span>;<br>        &#125;<br>        <span class="hljs-comment">//辅助指针</span><br>        <span class="hljs-type">Emp</span> <span class="hljs-variable">curEmp</span> <span class="hljs-operator">=</span> head;<br>        <span class="hljs-keyword">while</span> (<span class="hljs-literal">true</span>)&#123;<br>            <span class="hljs-keyword">if</span> (curEmp.id == id)&#123; <span class="hljs-comment">//找到</span><br>                <span class="hljs-keyword">break</span>;   <span class="hljs-comment">//此时curEmp就指向要找的雇员</span><br>            &#125;<br>            <span class="hljs-comment">//遍历完都没有找到</span><br>            <span class="hljs-keyword">if</span> (curEmp.next == <span class="hljs-literal">null</span>)&#123;<br>                curEmp = <span class="hljs-literal">null</span>;<br>                <span class="hljs-keyword">break</span>;<br>                <span class="hljs-comment">//没有找到就返回null，将其置为null，可以在退出循环之后无须判断情况，直接返回curEmp</span><br>            &#125;<br>            curEmp = curEmp.next;<br>        &#125;<br>        <span class="hljs-keyword">return</span> curEmp;<br>    &#125;<br>&#125;<br><br></code></pre></td></tr></table></figure>
